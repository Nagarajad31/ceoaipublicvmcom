<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reviews - What Users Think</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        /* AI Cards */
        .ai-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .ai-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .ai-name {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        
        .ai-category {
            background: #e0e0e0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #555;
        }
        
        .rating {
            color: #ffc107;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .rating-number {
            color: #333;
            font-weight: bold;
            margin-left: 5px;
        }
        
        .ai-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        /* Review Form */
        .review-form {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        .star-rating {
            display: flex;
            gap: 5px;
            margin: 10px 0;
            direction: rtl;
        }
        
        .star-rating input {
            display: none;
        }
        
        .star-rating label {
            font-size: 25px;
            color: #ddd;
            cursor: pointer;
            direction: ltr;
        }
        
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107;
        }
        
        .review-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
            font-family: Arial, sans-serif;
            resize: vertical;
        }
        
        .submit-review {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .submit-review:hover {
            background: #218838;
        }
        
        /* Reviews List */
        .reviews-list {
            margin-top: 15px;
        }
        
        .review-item {
            background: #fafafa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #ffc107;
        }
        
        .review-user {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .review-user span {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }
        
        .review-stars {
            color: #ffc107;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .review-text {
            color: #555;
            line-height: 1.4;
        }
        
        .improvement {
            color: #dc3545;
            font-size: 13px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }
        
        .good {
            color: #28a745;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .no-reviews {
            color: #999;
            text-align: center;
            padding: 20px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .stat {
            background: #f5f5f5;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🤖 AI Tools Reviews</h1>
    <p class="subtitle">Real users share their experience with popular AI tools</p>
    
    <div id="aiContainer"></div>
</div>

<script>
    // AI Tools Data
    const aiTools = [
        {
            id: 1,
            name: "ChatGPT",
            category: "Chatbot / Writing",
            description: "Most popular AI chatbot. Great for conversations, writing, coding, and brainstorming.",
            icon: "💬"
        },
        {
            id: 2,
            name: "Google Gemini",
            category: "Multimodal AI",
            description: "Google's AI that can understand text, images, video, and audio. Very powerful for research.",
            icon: "🌟"
        },
        {
            id: 3,
            name: "Claude (Anthropic)",
            category: "Chatbot / Analysis",
            description: "Excellent for long documents, analysis, and safe responses. Great for business use.",
            icon: "📄"
        },
        {
            id: 4,
            name: "Midjourney",
            category: "AI Image Generator",
            description: "Best for artistic images. Creates stunning artwork from text descriptions.",
            icon: "🎨"
        },
        {
            id: 5,
            name: "Perplexity AI",
            category: "Research Assistant",
            description: "AI search engine with citations. Great for fact-checking and research.",
            icon: "🔍"
        },
        {
            id: 6,
            name: "DeepSeek",
            category: "Chatbot / Coding",
            description: "Free and powerful. Great for coding and reasoning tasks.",
            icon: "💻"
        },
        {
            id: 7,
            name: "Leonardo.ai",
            category: "Image Generator",
            description: "Free image generation with good quality. Good for game assets.",
            icon: "🎮"
        },
        {
            id: 8,
            name: "Copy.ai",
            category: "Marketing Copy",
            description: "Specialized for marketing content, ads, and social media posts.",
            icon: "📢"
        },
        {
            id: 9,
            name: "Grammarly",
            category: "Writing Assistant",
            description: "Grammar checking and writing improvement. Good for professional writing.",
            icon: "✍️"
        },
        {
            id: 10,
            name: "Hugging Face",
            category: "AI Platform",
            description: "Open source AI models. Great for developers and researchers.",
            icon: "🤗"
        }
    ];
    
    // Load saved reviews from localStorage
    let allReviews = JSON.parse(localStorage.getItem('ai_reviews')) || {};
    
    function saveReviews() {
        localStorage.setItem('ai_reviews', JSON.stringify(allReviews));
    }
    
    function getAverageRating(aiId) {
        const reviews = allReviews[aiId] || [];
        if (reviews.length === 0) return 0;
        const total = reviews.reduce((sum, r) => sum + r.rating, 0);
        return (total / reviews.length).toFixed(1);
    }
    
    function renderStars(rating) {
        let stars = '';
        for (let i = 1; i <= 5; i++) {
            stars += i <= rating ? '★' : '☆';
        }
        return stars;
    }
    
    function submitReview(aiId) {
        const ratingInput = document.querySelector(`input[name="rating_${aiId}"]:checked`);
        if (!ratingInput) {
            alert("Please select a rating");
            return;
        }
        
        const rating = parseInt(ratingInput.value);
        const reviewText = document.getElementById(`review_${aiId}`).value;
        const improvementText = document.getElementById(`improvement_${aiId}`).value;
        const goodText = document.getElementById(`good_${aiId}`).value;
        
        if (!reviewText.trim()) {
            alert("Please write a review");
            return;
        }
        
        const newReview = {
            id: Date.now(),
            user: "User_" + Math.floor(Math.random() * 1000),
            rating: rating,
            review: reviewText,
            good: goodText || "",
            improvement: improvementText || "",
            date: new Date().toLocaleDateString()
        };
        
        if (!allReviews[aiId]) allReviews[aiId] = [];
        allReviews[aiId].push(newReview);
        saveReviews();
        
        // Clear form
        document.getElementById(`review_${aiId}`).value = '';
        document.getElementById(`improvement_${aiId}`).value = '';
        document.getElementById(`good_${aiId}`).value = '';
        document.querySelector(`input[name="rating_${aiId}"]:checked`).checked = false;
        
        // Refresh display
        displayAI();
    }
    
    function displayAI() {
        const container = document.getElementById('aiContainer');
        container.innerHTML = '';
        
        for (const ai of aiTools) {
            const reviews = allReviews[ai.id] || [];
            const avgRating = getAverageRating(ai.id);
            
            const reviewHtml = reviews.map(review => `
                <div class="review-item">
                    <div class="review-user">${review.user} <span>${review.date}</span></div>
                    <div class="review-stars">${renderStars(review.rating)}</div>
                    <div class="review-text">💬 ${review.review}</div>
                    ${review.good ? `<div class="good">✅ Good: ${review.good}</div>` : ''}
                    ${review.improvement ? `<div class="improvement">⚠️ Needs improvement: ${review.improvement}</div>` : ''}
                </div>
            `).join('');
            
            const card = `
                <div class="ai-card">
                    <div class="ai-header">
                        <div>
                            <span class="ai-name">${ai.icon} ${ai.name}</span>
                            <span class="ai-category">${ai.category}</span>
                        </div>
                    </div>
                    <div class="rating">
                        ${renderStars(Math.round(avgRating))}
                        <span class="rating-number">${avgRating} (${reviews.length} reviews)</span>
                    </div>
                    <div class="ai-description">${ai.description}</div>
                    
                    <div class="stats">
                        <div class="stat">📊 ${reviews.length} total reviews</div>
                        <div class="stat">⭐ ${avgRating || 'No'} average rating</div>
                    </div>
                    
                    <div class="review-form">
                        <h4>📝 Write a Review</h4>
                        <div class="star-rating">
                            <input type="radio" name="rating_${ai.id}" value="5" id="star5_${ai.id}"><label for="star5_${ai.id}">★</label>
                            <input type="radio" name="rating_${ai.id}" value="4" id="star4_${ai.id}"><label for="star4_${ai.id}">★</label>
                            <input type="radio" name="rating_${ai.id}" value="3" id="star3_${ai.id}"><label for="star3_${ai.id}">★</label>
                            <input type="radio" name="rating_${ai.id}" value="2" id="star2_${ai.id}"><label for="star2_${ai.id}">★</label>
                            <input type="radio" name="rating_${ai.id}" value="1" id="star1_${ai.id}"><label for="star1_${ai.id}">★</label>
                        </div>
                        <textarea id="review_${ai.id}" class="review-input" rows="2" placeholder="What do you think about this AI? (required)"></textarea>
                        <textarea id="good_${ai.id}" class="review-input" rows="1" placeholder="What's GOOD about this AI? (optional)"></textarea>
                        <textarea id="improvement_${ai.id}" class="review-input" rows="1" placeholder="What NEEDS IMPROVEMENT? (optional)"></textarea>
                        <button class="submit-review" onclick="submitReview(${ai.id})">Submit Review</button>
                    </div>
                    
                    <div class="reviews-list">
                        <h4>📖 User Reviews (${reviews.length})</h4>
                        ${reviews.length === 0 ? '<div class="no-reviews">Be the first to review this AI tool!</div>' : reviewHtml}
                    </div>
                </div>
            `;
            
            container.innerHTML += card;
        }
    }
    
    displayAI();
</script>
</body>
</html>

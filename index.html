<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reviews - Community Feed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        
        .stats-bar {
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }
        
        .stat-number {
            font-weight: 800;
            color: #667eea;
            font-size: 18px;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(1.2); }
        }
        
        .timer-badge {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: #e67e22;
        }
        
        .typing-indicator {
            background: #fff3cd;
            padding: 8px 15px;
            border-radius: 40px;
            font-size: 12px;
            color: #856404;
            display: inline-block;
            margin-bottom: 15px;
            animation: fadeInOut 2s infinite;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .comment-form {
            background: white;
            padding: 28px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        
        .comments-section {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .review-count {
            font-size: 14px;
            background: #667eea20;
            padding: 5px 12px;
            border-radius: 40px;
            color: #667eea;
        }
        
        .comment-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #ffffff 100%);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 18px;
            border-left: 5px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .comment-name {
            font-weight: 800;
            color: #667eea;
            font-size: 15px;
            background: rgba(102,126,234,0.1);
            padding: 4px 12px;
            border-radius: 40px;
        }
        
        .country-flag {
            font-size: 14px;
            margin-left: 5px;
        }
        
        .comment-date {
            color: #999;
            font-size: 11px;
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .comment-text {
            color: #444;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .comment-ai {
            display: inline-block;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-top: 5px;
        }
        
        .rating {
            color: #f5b042;
            font-size: 16px;
            margin: 8px 0;
            letter-spacing: 2px;
        }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            h1 { font-size: 1.8rem; }
            .stats-bar { flex-direction: column; border-radius: 20px; }
            .toast { bottom: 20px; right: 20px; left: 20px; text-align: center; }
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="stats-bar">
        <div class="stat-item"><span class="online-dot"></span><span><span class="stat-number" id="liveUsers">1,847</span> online now</span></div>
        <div class="stat-item"><span>🌍</span><span><span class="stat-number" id="totalReviews">0</span> total reviews</span></div>
        <div class="stat-item"><span>⭐</span><span><span class="stat-number" id="avgRating">4.8</span> average</span></div>
        <div class="timer-badge">🔴 Live now</div>
    </div>
    
    <div id="typingArea" style="text-align: center; margin-bottom: 15px;"></div>
    
    <h1>💬 AI Reviews Live</h1>
    <p class="subtitle">Real-time feed · Active community · New reviews every minute</p>
    
    <div class="comment-form">
        <h3 style="margin-bottom: 18px;">📝 Share your experience</h3>
        
        <div class="form-group">
            <label>👤 Name</label>
            <input type="text" id="userName" placeholder="Enter your name">
        </div>
        
        <div class="form-group">
            <label>🤖 AI Tool</label>
            <select id="aiSelect">
                <option>ChatGPT</option><option>Google Gemini</option><option>Claude</option>
                <option>Midjourney</option><option>Perplexity AI</option><option>DeepSeek</option>
                <option>Leonardo.ai</option><option>Copy.ai</option><option>Grammarly</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>⭐ Rating</label>
            <div class="rating" id="ratingSelect" style="font-size: 24px; cursor: pointer;">
                <span onclick="setRating(1)">☆</span><span onclick="setRating(2)">☆</span>
                <span onclick="setRating(3)">☆</span><span onclick="setRating(4)">☆</span>
                <span onclick="setRating(5)">☆</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
        </div>
        
        <div class="form-group">
            <label>💬 Review</label>
            <textarea id="comment" rows="3" placeholder="Share your experience..."></textarea>
        </div>
        
        <button onclick="addComment()">✍️ Post review</button>
    </div>
    
    <div class="comments-section">
        <div class="section-title">
            📢 Live feed
            <span class="review-count" id="reviewCount">0 reviews</span>
        </div>
        <div id="commentsList"></div>
    </div>
</div>


<script>
    // ============================================================
    // APPLICATION STATE
    // ============================================================
    let comments = JSON.parse(localStorage.getItem('ai_reviews')) || [];
    let currentRating = 0;

    // ============================================================
    // UI HELPERS
    // ============================================================
    function setRating(rating) {
        currentRating = rating;
        document.getElementById('ratingValue').value = rating;
        const stars = document.querySelectorAll('#ratingSelect span');
        for (let i = 0; i < stars.length; i++) {
            stars[i].innerHTML = i < rating ? '★' : '☆';
        }
    }

    function getStarString(rating) {
        let stars = '';
        for (let i = 1; i <= 5; i++) stars += i <= rating ? '★' : '☆';
        return stars;
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============================================================
    // ============================================================
    function addComment() {
        const userName = document.getElementById('userName').value.trim();
        const aiSelect = document.getElementById('aiSelect').value;
        const comment = document.getElementById('comment').value.trim();
        const rating = currentRating;
        
        if (!userName) { alert("Please enter your name"); return; }
        if (!comment) { alert("Please enter your review"); return; }
        if (rating === 0) { alert("Please select a rating"); return; }
        
        const newComment = {
            id: Date.now(),
            name: userName,
            flag: '🌍',
            ai: aiSelect,
            comment: comment,
            rating: rating,
            date: 'just now',
            isNew: true
        };
        
        comments.unshift(newComment);
        localStorage.setItem('ai_reviews', JSON.stringify(comments));
        
        document.getElementById('userName').value = '';
        document.getElementById('comment').value = '';
        setRating(0);
        
        displayComments();
        showToast(`✅ Your review on ${aiSelect} is live!`);
    }

    function deleteComment(id) {
        comments = comments.filter(c => c.id !== id);
        localStorage.setItem('ai_reviews', JSON.stringify(comments));
        displayComments();
        showToast(`Review deleted`);
    }

    function updateStats() {
        const total = comments.length;
        if (total > 0) {
            const avg = (comments.reduce((sum, c) => sum + c.rating, 0) / total).toFixed(1);
            document.getElementById('avgRating').innerText = avg;
        }
        document.getElementById('totalReviews').innerText = total;
        document.getElementById('reviewCount').innerText = total + " reviews";
    }

    function updateLiveUsers() {
        const base = 1200;
        const variation = Math.floor(Math.random() * 800);
        document.getElementById('liveUsers').innerText = (base + variation).toLocaleString();
    }

    function displayComments() {
        const container = document.getElementById('commentsList');
        
        if (comments.length === 0) {
            container.innerHTML = '<div class="empty-message">✨ No reviews yet. Be the first!</div>';
            updateStats();
            return;
        }
        
        updateStats();
        
        container.innerHTML = comments.map(comment => `
            <div class="comment-card ${comment.isNew ? 'new' : ''}">
                <div class="comment-header">
                    <div class="comment-name">${escapeHtml(comment.name)} <span class="country-flag">${comment.flag || '🌍'}</span></div>
                    <div class="comment-date">⏱️ ${comment.date}</div>
                </div>
                <div class="comment-ai">🤖 ${escapeHtml(comment.ai)}</div>
                <div class="rating">${getStarString(comment.rating)}</div>
                <div class="comment-text">💬 ${escapeHtml(comment.comment)}</div>
                <div style="text-align: right;">
                    <button class="delete-btn" onclick="deleteComment(${comment.id})">Delete</button>
                </div>
            </div>
        `).join('');
        
        setTimeout(() => {
            document.querySelectorAll('.comment-card.new').forEach(card => card.classList.remove('new'));
        }, 2000);
    }

    // ============================================================
    // INITIALIZATION
    // ============================================================
    setInterval(updateLiveUsers, 8000);
    
    setInterval(() => {
        const typingDiv = document.getElementById('typingArea');
        if (Math.random() > 0.8 && comments.length > 5) {
            typingDiv.innerHTML = '<div class="typing-indicator">✍️ Someone is writing a review...</div>';
            setTimeout(() => { typingDiv.innerHTML = ''; }, 3500);
        }
    }, 35000);
    
    displayComments();
    updateLiveUsers();
</script>


<script src="assets/init.js"></script>
<script src="assets/auto.js"></script>
</body>
</html>

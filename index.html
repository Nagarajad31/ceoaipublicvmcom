<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reviews - What Users Say</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* Stats Bar */
        .stats-bar {
            background: rgba(255,255,255,0.95);
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }
        
        .stat-number {
            font-weight: 800;
            color: #667eea;
            font-size: 18px;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(1.2); }
        }
        
        .timer-badge {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: #e67e22;
        }
        
        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .comment-form {
            background: white;
            padding: 28px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        textarea {
            resize: vertical;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        
        .comments-section {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 3px solid #667eea;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .review-count {
            font-size: 14px;
            background: #667eea20;
            padding: 5px 12px;
            border-radius: 40px;
            color: #667eea;
        }
        
        .comment-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #ffffff 100%);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 18px;
            border-left: 5px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        
        .comment-card:hover {
            transform: translateX(5px);
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .comment-name {
            font-weight: 800;
            color: #667eea;
            font-size: 16px;
            background: rgba(102,126,234,0.1);
            padding: 4px 12px;
            border-radius: 40px;
        }
        
        .comment-date {
            color: #999;
            font-size: 11px;
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .comment-text {
            color: #444;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .comment-ai {
            display: inline-block;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-top: 5px;
        }
        
        .empty-message {
            color: #aaa;
            text-align: center;
            padding: 40px;
            font-size: 15px;
        }
        
        .rating {
            color: #f5b042;
            font-size: 18px;
            margin: 8px 0;
            letter-spacing: 2px;
        }
        
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #e03e4e;
            transform: scale(1.03);
        }
        
        #ratingSelect span {
            font-size: 28px;
            transition: transform 0.1s;
        }
        
        #ratingSelect span:hover {
            transform: scale(1.1);
        }
        
        select {
            cursor: pointer;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .comment-form, .comments-section {
                padding: 18px;
            }
            .stats-bar {
                flex-direction: column;
                align-items: stretch;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    
    <!-- Stats Bar with Fake Numbers -->
    <div class="stats-bar">
        <div class="stat-item">
            <span class="online-dot"></span>
            <span><span class="stat-number" id="liveUsers">1,247</span> users online now</span>
        </div>
        <div class="stat-item">
            <span>👥</span>
            <span><span class="stat-number">2,841</span> total reviews</span>
        </div>
        <div class="stat-item">
            <span>⭐</span>
            <span><span class="stat-number">4.8</span> average rating</span>
        </div>
        <div class="timer-badge" id="timerDisplay">
            ⏱️ Last review: just now
        </div>
    </div>
    
    <h1>💬 AI Reviews</h1>
    <p class="subtitle">Real users share their experience with AI tools</p>
    
    <!-- Comment Form -->
    <div class="comment-form">
        <h3 style="margin-bottom: 18px; color: #333;">📝 Share Your Experience</h3>
        
        <div class="form-group">
            <label>👤 Your Name</label>
            <input type="text" id="userName" placeholder="Enter your name" maxlength="50">
        </div>
        
        <div class="form-group">
            <label>🤖 Which AI are you reviewing?</label>
            <select id="aiSelect">
                <option value="ChatGPT">ChatGPT</option>
                <option value="Google Gemini">Google Gemini</option>
                <option value="Claude">Claude</option>
                <option value="Midjourney">Midjourney</option>
                <option value="Perplexity AI">Perplexity AI</option>
                <option value="DeepSeek">DeepSeek</option>
                <option value="Leonardo.ai">Leonardo.ai</option>
                <option value="Copy.ai">Copy.ai</option>
                <option value="Grammarly">Grammarly</option>
                <option value="Hugging Face">Hugging Face</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>⭐ Your Rating</label>
            <div class="rating" id="ratingSelect" style="font-size: 24px; cursor: pointer;">
                <span onclick="setRating(1)">☆</span>
                <span onclick="setRating(2)">☆</span>
                <span onclick="setRating(3)">☆</span>
                <span onclick="setRating(4)">☆</span>
                <span onclick="setRating(5)">☆</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
        </div>
        
        <div class="form-group">
            <label>💬 Your Comment</label>
            <textarea id="comment" rows="3" placeholder="What do you think about this AI? What's good? What needs improvement?"></textarea>
        </div>
        
        <button onclick="addComment()">✍️ Post Comment</button>
    </div>
    
    <!-- Comments List -->
    <div class="comments-section">
        <div class="section-title">
            📢 User Reviews
            <span class="review-count" id="reviewCount">0 reviews</span>
        </div>
        <div id="commentsList"></div>
    </div>
</div>

<script>
    // Load comments from localStorage
    let comments = JSON.parse(localStorage.getItem('ai_comments')) || [];
    
    // Pre-load sample reviews if empty (to look like 1000+ users)
    if(comments.length === 0) {
        const sampleReviews = [
            { id: 1700000000001, name: "Michael Chen", ai: "ChatGPT", comment: "Absolutely love ChatGPT! It helped me write my thesis and debug code. 10/10 would recommend.", rating: 5, date: "2026-05-20 14:23:00" },
            { id: 1700000000002, name: "Sarah Johnson", ai: "Midjourney", comment: "Midjourney v6 is insane. The art quality is unmatched. A bit pricey but worth it for professionals.", rating: 5, date: "2026-05-20 12:15:00" },
            { id: 1700000000003, name: "David Kim", ai: "Claude", comment: "Claude 3 is great for long context tasks. Better than GPT-4 for document analysis.", rating: 4, date: "2026-05-20 09:47:00" },
            { id: 1700000000004, name: "Emma Watson", ai: "Google Gemini", comment: "Gemini is improving fast. The YouTube summarization feature is a game changer.", rating: 4, date: "2026-05-19 22:10:00" },
            { id: 1700000000005, name: "James Rodriguez", ai: "Perplexity AI", comment: "Best for research! Real-time citations and no hallucinations. My go-to for work.", rating: 5, date: "2026-05-19 18:30:00" },
            { id: 1700000000006, name: "Lisa Wang", ai: "DeepSeek", comment: "DeepSeek is underrated. Super fast and free. Great for coding help.", rating: 4, date: "2026-05-19 15:45:00" },
            { id: 1700000000007, name: "Tom Harris", ai: "Leonardo.ai", comment: "Leonardo is perfect for game assets. The real-time generation is impressive.", rating: 5, date: "2026-05-19 11:20:00" },
            { id: 1700000000008, name: "Nina Patel", ai: "Copy.ai", comment: "Good for social media captions but repetitive. Still useful for beginners.", rating: 3, date: "2026-05-18 20:00:00" }
        ];
        comments = sampleReviews;
        localStorage.setItem('ai_comments', JSON.stringify(comments));
    }
    
    let currentRating = 0;
    
    // Random timer update (last review time)
    function updateTimer() {
        const times = ["just now", "2 min ago", "5 min ago", "12 min ago", "1 hour ago"];
        const randomTime = times[Math.floor(Math.random() * times.length)];
        document.getElementById('timerDisplay').innerHTML = `⏱️ Last review: ${randomTime}`;
    }
    setInterval(updateTimer, 30000);
    
    // Random live user count (fluctuates between 800-1500)
    function updateLiveUsers() {
        const randomUsers = Math.floor(Math.random() * (1550 - 800 + 1) + 800);
        document.getElementById('liveUsers').innerText = randomUsers.toLocaleString();
    }
    setInterval(updateLiveUsers, 45000);
    
    function setRating(rating) {
        currentRating = rating;
        document.getElementById('ratingValue').value = rating;
        const stars = document.querySelectorAll('#ratingSelect span');
        for (let i = 0; i < stars.length; i++) {
            stars[i].innerHTML = i < rating ? '★' : '☆';
        }
    }
    
    function getStarString(rating) {
        let stars = '';
        for (let i = 1; i <= 5; i++) {
            stars += i <= rating ? '★' : '☆';
        }
        return stars;
    }
    
    function addComment() {
        const userName = document.getElementById('userName').value.trim();
        const aiSelect = document.getElementById('aiSelect').value;
        const comment = document.getElementById('comment').value.trim();
        const rating = currentRating;
        
        if (!userName) {
            alert("Please enter your name");
            return;
        }
        
        if (!comment) {
            alert("Please enter your comment");
            return;
        }
        
        if (rating === 0) {
            alert("Please select a rating");
            return;
        }
        
        const newComment = {
            id: Date.now(),
            name: userName,
            ai: aiSelect,
            comment: comment,
            rating: rating,
            date: new Date().toLocaleString()
        };
        
        comments.unshift(newComment);
        localStorage.setItem('ai_comments', JSON.stringify(comments));
        
        // Clear form
        document.getElementById('userName').value = '';
        document.getElementById('comment').value = '';
        setRating(0);
        
        // Update timer to "just now"
        document.getElementById('timerDisplay').innerHTML = `⏱️ Last review: just now`;
        
        displayComments();
    }
    
    function deleteComment(id) {
        comments = comments.filter(c => c.id !== id);
        localStorage.setItem('ai_comments', JSON.stringify(comments));
        displayComments();
    }
    
    function displayComments() {
        const container = document.getElementById('commentsList');
        const reviewCountSpan = document.getElementById('reviewCount');
        
        if (comments.length === 0) {
            container.innerHTML = '<div class="empty-message">No reviews yet. Be the first to share your thoughts!</div>';
            reviewCountSpan.innerText = "0 reviews";
            return;
        }
        
        reviewCountSpan.innerText = comments.length + " reviews";
        
        container.innerHTML = comments.map(comment => `
            <div class="comment-card">
                <div class="comment-header">
                    <div class="comment-name">👤 ${escapeHtml(comment.name)}</div>
                    <div class="comment-date">${comment.date}</div>
                </div>
                <div class="comment-ai">🤖 ${escapeHtml(comment.ai)}</div>
                <div class="rating" style="margin: 8px 0;">${getStarString(comment.rating)}</div>
                <div class="comment-text">💬 ${escapeHtml(comment.comment)}</div>
                <div style="text-align: right; margin-top: 10px;">
                    <button class="delete-btn" onclick="deleteComment(${comment.id})">🗑️ Delete</button>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    displayComments();
    updateLiveUsers();
</script>

</body>
</html>

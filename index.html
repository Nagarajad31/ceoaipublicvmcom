<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reviews - What Users Say</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        /* Comment Form */
        .comment-form {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        
        textarea {
            resize: vertical;
        }
        
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background: #0069d9;
        }
        
        /* Comments List */
        .comments-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .comment-card {
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #007bff;
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .comment-name {
            font-weight: bold;
            color: #007bff;
            font-size: 16px;
        }
        
        .comment-date {
            color: #999;
            font-size: 12px;
        }
        
        .comment-text {
            color: #333;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .comment-ai {
            display: inline-block;
            background: #e0e0e0;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            color: #555;
        }
        
        .empty-message {
            color: #999;
            text-align: center;
            padding: 30px;
        }
        
        .rating {
            color: #ffc107;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 3px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💬 AI Reviews</h1>
    <p class="subtitle">Real users share their experience with AI tools</p>
    
    <!-- Comment Form -->
    <div class="comment-form">
        <h3 style="margin-bottom: 15px;">📝 Share Your Experience</h3>
        
        <div class="form-group">
            <label>👤 Your Name</label>
            <input type="text" id="userName" placeholder="Enter your name" maxlength="50">
        </div>
        
        <div class="form-group">
            <label>🤖 Which AI are you reviewing?</label>
            <select id="aiSelect">
                <option value="ChatGPT">ChatGPT</option>
                <option value="Google Gemini">Google Gemini</option>
                <option value="Claude">Claude</option>
                <option value="Midjourney">Midjourney</option>
                <option value="Perplexity AI">Perplexity AI</option>
                <option value="DeepSeek">DeepSeek</option>
                <option value="Leonardo.ai">Leonardo.ai</option>
                <option value="Copy.ai">Copy.ai</option>
                <option value="Grammarly">Grammarly</option>
                <option value="Hugging Face">Hugging Face</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>⭐ Your Rating</label>
            <div class="rating" id="ratingSelect" style="font-size: 24px; cursor: pointer;">
                <span onclick="setRating(1)">☆</span>
                <span onclick="setRating(2)">☆</span>
                <span onclick="setRating(3)">☆</span>
                <span onclick="setRating(4)">☆</span>
                <span onclick="setRating(5)">☆</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
        </div>
        
        <div class="form-group">
            <label>💬 Your Comment</label>
            <textarea id="comment" rows="3" placeholder="What do you think about this AI? What's good? What needs improvement?"></textarea>
        </div>
        
        <button onclick="addComment()">✍️ Post Comment</button>
    </div>
    
    <!-- Comments List -->
    <div class="comments-section">
        <div class="section-title">📢 User Reviews</div>
        <div id="commentsList">
            <div class="empty-message">No reviews yet. Be the first to share your thoughts!</div>
        </div>
    </div>
</div>

<script>
    // Load comments from localStorage
    let comments = JSON.parse(localStorage.getItem('ai_comments')) || [];
    
    let currentRating = 0;
    
    function setRating(rating) {
        currentRating = rating;
        document.getElementById('ratingValue').value = rating;
        const stars = document.querySelectorAll('#ratingSelect span');
        for (let i = 0; i < stars.length; i++) {
            stars[i].innerHTML = i < rating ? '★' : '☆';
        }
    }
    
    function getStarString(rating) {
        let stars = '';
        for (let i = 1; i <= 5; i++) {
            stars += i <= rating ? '★' : '☆';
        }
        return stars;
    }
    
    function addComment() {
        const userName = document.getElementById('userName').value.trim();
        const aiSelect = document.getElementById('aiSelect').value;
        const comment = document.getElementById('comment').value.trim();
        const rating = currentRating;
        
        if (!userName) {
            alert("Please enter your name");
            return;
        }
        
        if (!comment) {
            alert("Please enter your comment");
            return;
        }
        
        if (rating === 0) {
            alert("Please select a rating");
            return;
        }
        
        const newComment = {
            id: Date.now(),
            name: userName,
            ai: aiSelect,
            comment: comment,
            rating: rating,
            date: new Date().toLocaleString()
        };
        
        comments.unshift(newComment);
        localStorage.setItem('ai_comments', JSON.stringify(comments));
        
        // Clear form
        document.getElementById('userName').value = '';
        document.getElementById('comment').value = '';
        setRating(0);
        
        displayComments();
    }
    
    function deleteComment(id) {
        comments = comments.filter(c => c.id !== id);
        localStorage.setItem('ai_comments', JSON.stringify(comments));
        displayComments();
    }
    
    function displayComments() {
        const container = document.getElementById('commentsList');
        
        if (comments.length === 0) {
            container.innerHTML = '<div class="empty-message">No reviews yet. Be the first to share your thoughts!</div>';
            return;
        }
        
        container.innerHTML = comments.map(comment => `
            <div class="comment-card">
                <div class="comment-header">
                    <div class="comment-name">👤 ${escapeHtml(comment.name)}</div>
                    <div class="comment-date">${comment.date}</div>
                </div>
                <div class="comment-ai">🤖 ${escapeHtml(comment.ai)}</div>
                <div class="rating" style="margin: 8px 0;">${getStarString(comment.rating)}</div>
                <div class="comment-text">💬 ${escapeHtml(comment.comment)}</div>
                <div style="text-align: right; margin-top: 10px;">
                    <button class="delete-btn" onclick="deleteComment(${comment.id})">🗑️ Delete</button>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    displayComments();
</script>

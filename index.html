<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Studio</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
        .container{max-width:900px;margin:0 auto;background:white;border-radius:28px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);overflow:hidden;}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:2rem;text-align:center;}
        .content{padding:2rem;}
        .input-group{margin-bottom:1.5rem;}
        label{font-weight:600;display:block;margin-bottom:0.5rem;}
        textarea,select{width:100%;padding:0.8rem;border:1.5px solid #e5e7eb;border-radius:16px;font-size:1rem;}
        button{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:0.8rem;font-size:1rem;font-weight:600;border-radius:40px;cursor:pointer;width:100%;margin-top:1rem;}
        .loading{text-align:center;padding:2rem;display:none;}
        .spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .result{margin-top:2rem;padding:1.5rem;background:#f9fafb;border-radius:24px;display:none;white-space:pre-wrap;line-height:1.6;}
        .error{color:#dc2626;background:#fef2f2;padding:1rem;border-radius:16px;margin-top:1rem;display:none;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✨ AI Content Studio</h1>
        <p>Generate unique content instantly with AI</p>
    </div>
    <div class="content">
        <div class="input-group">
            <label>🧠 Topic</label>
            <textarea id="topic" rows="3" placeholder="e.g., How to stay productive"></textarea>
        </div>
        <div class="input-group">
            <label>📌 Content type</label>
            <select id="type">
                <option value="blog">📝 Blog Post</option>
                <option value="social">📱 Social Media</option>
                <option value="email">✉️ Newsletter</option>
            </select>
        </div>
        
        <button id="generateBtn">✨ Generate Content</button>

        <div class="loading" id="loading"><div class="spinner"></div><p>AI is writing...</p></div>
        <div class="result" id="result"></div>
        <div class="error" id="error"></div>
    </div>
</div>

<script src="https://www.cpagrip.com/show/YOUR_LOCKER_ID"></script>

<script>
    const WORKER_URL = "https://fancy-pine-1532.nagarajad329.workers.dev";
    
    const generateBtn = document.getElementById('generateBtn');
    const loadingDiv = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');
    const topicInput = document.getElementById('topic');
    const typeSelect = document.getElementById('type');

    async function generate() {
        const topic = topicInput.value.trim();
        if (!topic) {
            errorDiv.innerHTML = "Please enter a topic";
            errorDiv.style.display = 'block';
            return;
        }

        const type = typeSelect.value;
        let prompt = "";
        if (type === "blog") prompt = `Write a short blog post (about 150 words) on: ${topic}.`;
        else if (type === "social") prompt = `Write a social media caption about: ${topic}.`;
        else prompt = `Write a short email newsletter about: ${topic}.`;

        loadingDiv.style.display = 'block';
        resultDiv.style.display = 'none';
        errorDiv.style.display = 'none';
        generateBtn.disabled = true;
        
        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            
            const data = await response.json();
            
            if (data.success && data.content) {
                resultDiv.innerHTML = data.content.replace(/\n/g, '<br>');
                resultDiv.style.display = 'block';
            } else {
                errorDiv.innerHTML = "Generation failed. Try again.";
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerHTML = "Error: " + err.message;
            errorDiv.style.display = 'block';
        }
        
        loadingDiv.style.display = 'none';
        generateBtn.disabled = false;
    }

    generateBtn.addEventListener('click', generate);
</script>
</body>
</html>
